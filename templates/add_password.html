{% extends "base.html"%}
{%block body%}
    <h1>You can add Password now</h1>
    <div class="container">
        <form id="forme" action ="{{url_for('add_password')}}" method="post">
            <input type="text" placeholder="site_name" name="site_name" id="site_name" class="inputs"/>
            <input type="password" placeholder="password" name="password" id="password" class="inputs"/>
            <input type="button"  value="Generate_Password" class="btn btn_Generate" onclick="Genrate()"/>
            <input type="submit"  value="valide" class="btn btn_valide"/>
        </form>
        {% if error %}
            <p  id="error">{{ error }} ! ! !</p>
        {% endif %}
    </div>
    <script>
        const password_input=document.getElementById("password")
        const len=12;
        const upperCase="ABCDEFGHIJKLMNOPQRSTUVWXYZ"
        const lowerCase="abcdefghijklmnopqrstuvwxyz"
        const numbers="0123456789"
        const symbol="@#$%^&*()_+~|}{[]></-="
        const allChar=upperCase+lowerCase+numbers+symbol;
        function Genrate(){
            let Password="";
            Password+=upperCase[Math.floor(Math.random()* upperCase.length)];
            Password+=lowerCase[Math.floor(Math.random()* lowerCase.length)];
            Password+=numbers[Math.floor(Math.random()* numbers.length)];
            Password+=symbol[Math.floor(Math.random()* symbol.length)];
            while(len>Password.length){
                Password+=allChar[Math.floor(Math.random()* allChar.length)];
            }
            password_input.value=Password
        }
    </script>
{%endblock%}
