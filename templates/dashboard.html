{% extends "base.html"%}
{%block body%}
<div class="container">
    {% if passwords | length  < 1 %}
        <h1>There are no passwords saved </h1>
    {%else%}
        <h3>Your Passwords</h3>
        <table border="1">
            <tr>
                <th>Id</th>
                <th>Site_name</th>
                <th>Password</th>
                <th>Optional action</th>
            </tr>
            {%for p in passwords %}
                <tr>
                    <td>{{p.id}}</td>
                    <td>{{p.site_name}}</td>
                    <td>{{p.password}}</td>    
                    <td>
                        <form action="{{url_for('remove_password',id=p.id)}}" method="POST">
                            <button type="submit" class="btn btn_delete">Delete</button>
                        </form>
                    </td>
                </tr>
            {%endfor%}
        </table>
    {% endif %}
    <a href="{{url_for('add_password')}}" ><button class="btn btn_add">Add Password</button></a>
    <form action="{{url_for('logout')}}" method="POST">
        <button type="submit" class="btn btn_logout"> LogOut</button>
    </form>
</div>
    
{%endblock%}
